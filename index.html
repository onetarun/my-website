<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Modern Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <h2 class="logo">MyBrand </h2>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <h1>Welcome to My Website</h1>
        <p>Build modern apps with HTML, CSS & JavaScript</p>
        <button onclick="scrollToSection('services')">Explore</button>
    </section>

    <!-- Services -->
    <section id="services" class="services">
        <h2>Our Services</h2>
        <div class="cards">
            <div class="card">
                <h3>Web Development</h3>
                <p>Modern responsive websites</p>
            </div>
            <div class="card">
                <h3>Cloud Hosting</h3>
                <p>Azure deployment support</p>
            </div>
            <div class="card">
                <h3>UI Design</h3>
                <p>Clean and modern UI/UX</p>
            </div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="contact">
        <h2>Contact Us</h2>
        <form onsubmit="handleSubmit(event)">
            <input type="text" id="name" placeholder="Your Name">
            <input type="email" id="email" placeholder="Your Email">
            <textarea id="message" placeholder="Your Message"></textarea>
            <button type="submit">Send</button>
        </form>
        <p id="formMessage"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
